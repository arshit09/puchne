<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puchne — Grid View</title>
  <link rel="stylesheet" href="../styles/grid.css">
</head>
<body>
  <!-- ── Grid ────────────────────────────────────────────── -->
  <div class="grid-container" id="gridContainer"></div>

  <!-- ── Header Bar ──────────────────────────────────────── -->
  <div class="grid-header">
    <div class="grid-header-left">
      <img src="../icons/app/icon-48.png" width="20" height="20" alt="Puchne"/>
      <h1>Puchne</h1>
    </div>
    <div class="grid-header-center">
      <form id="gridQueryForm" class="grid-query-form">
        <textarea id="gridQueryInput" class="grid-query-input" placeholder="Ask follow-up..." autocomplete="off" rows="1"></textarea>
        <button type="submit" class="grid-query-btn" title="Send to all">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </form>
    </div>
    <div class="grid-header-right">
      <span class="toggle-label">Hover to Expand</span>
      <label class="toggle sm">
        <input type="checkbox" id="hoverExpandToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <script src="../scripts/constants.js"></script>
  <script src="../scripts/content.js"></script>
  <script src="grid.js"></script>
</body>
</html>
