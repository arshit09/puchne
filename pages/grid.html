<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puchne — Grid View</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/grid.css">
</head>
<body>
  <!-- ── Header Bar ──────────────────────────────────────── -->
  <div class="grid-header">
    <div class="grid-header-left">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="var(--accent)" stroke-width="2"/>
        <path d="M8 12l3 3 5-6" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>Puchne</h1>
      <span class="query-badge" id="queryBadge"></span>
    </div>
  </div>

  <!-- ── Grid ────────────────────────────────────────────── -->
  <div class="grid-container" id="gridContainer"></div>

  <script src="../scripts/constants.js"></script>
  <script src="grid.js"></script>
</body>
</html>
